name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Test Image
      run: docker build -t image_redactor_test -f Dockerfile.test .

    - name: Run Tests
      run: docker run --rm image_redactor_test

  build-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Build Release Docker Image
      run: docker build -t image_redactor_release -f Dockerfile .
      
